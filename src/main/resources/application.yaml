spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: exercise
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:postgres}
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: always

payment:
  toss:
    secret-key: ${TOSS_PAYMENT_SECRET}

api:
  init: /api/v1
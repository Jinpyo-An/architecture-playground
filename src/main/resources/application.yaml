spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: exercise
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:postgres}
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update

payment:
  toss:
    secret-key: ${TOSS_PAYMENT_SECRET}

api:
  init: /api/v1

order:
  auto-cancel:
    timeout-hours: 24
    cron: "0 */10 * * * *"
    batch-size: 500

openai:
  api-key: ${OPENAI_API_KEY:}
  chat:
    enabled: false
    model: gpt-5.4-mini
  embedding:
    enabled: false
    model: text-embedding-3-small
  image-analysis:
    model: gpt-5.4-nano
  image:
    model: gpt-image-1-mini
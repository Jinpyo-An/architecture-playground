name: exercise-service k8s deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  IMAGE_NAME: exercise-service

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Build jar
        run: ./gradlew clean bootJar
      - name: Build image
        run: docker build -t $IMAGE_NAME:${{ github.sha }} .

  deploy:
    needs: build
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Apply manifests
        run: kubectl apply -k k8s/exercise-service
